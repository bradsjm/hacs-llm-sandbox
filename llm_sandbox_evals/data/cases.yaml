- name: complex_hot_living_turn_on_fan
  inputs:
    id: complex_hot_living_turn_on_fan
    category: complex
    home: home_default
    user_request: If the living room temperature is above 24, turn on the living room fan to 50 percent, otherwise report
      the temperature.
    actions_enabled: true
    llm_context:
      device_id: device_assist_living
    expected:
      provenance_values: &id004
      - sensor.living_temp
      - fan.living_fan
      tool_result_checks:
      - tool_name: execute_home_code
        entity_ids: *id004
        entry_values:
        - '25.2'
      actions:
      - domain: fan
        service: set_percentage
        target_entity_ids:
        - fan.living_fan
        service_data:
          percentage: 50
- name: complex_humidity_dehumidifier
  inputs:
