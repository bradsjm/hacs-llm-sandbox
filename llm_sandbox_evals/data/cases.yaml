# yaml-language-server: $schema=cases_schema.json
name: llm_sandbox_action_cases
cases:
  - name: action_turn_on_bedroom_light
    inputs:
      id: action_turn_on_bedroom_light
      home: home_minimal
      user_request: Turn on bedroom light
      expected_actions:
        - domain: light
          service: turn_on
          target_entity_ids: [light.bedroom]
  - name: action_turn_off_bedroom_light
    inputs:
      id: action_turn_off_bedroom_light
      home: home_minimal
      user_request: Turn off bedroom light
      expected_actions:
        - domain: light
          service: turn_off
          target_entity_ids: [light.bedroom]
  - name: action_turn_on_living_light
    inputs:
      id: action_turn_on_living_light
      home: home_minimal
      user_request: Turn on living room light
      expected_actions:
        - domain: light
          service: turn_on
          target_entity_ids: [light.living]
  - name: action_turn_off_living_light
    inputs:
      id: action_turn_off_living_light
      home: home_minimal
      user_request: Turn off living room light
      expected_actions:
        - domain: light
          service: turn_off
          target_entity_ids: [light.living]
