# yaml-language-server: $schema=cases_schema.json
name: llm_sandbox_cases
cases:
- name: state_living_temperature
  inputs:
    id: state_living_temperature
    category: state_read
    home: home_minimal
    user_request: What is the current temperature in the living room?
    actions_enabled: false
    expected:
      provenance_values:
      - sensor.living_temp
      tool_result_checks:
      - tool_name: execute_home_code
        entity_ids:
        - sensor.living_temp
        entry_values:
        - '23.4'
- name: state_kitchen_light
  inputs:
    id: state_kitchen_light
    category: state_read
    home: home_minimal
    user_request: Is the kitchen light on?
    actions_enabled: false
    expected:
      provenance_values:
      - light.kitchen
      tool_result_checks:
      - tool_name: execute_home_code
        entity_ids:
        - light.kitchen
        entry_values:
        - 'off'
- name: state_living_fan
  inputs:
    id: state_living_fan
    category: state_read
    home: home_default
    user_request: Is the living room fan running right now?
    actions_enabled: false
    llm_context:
      device_id: device_assist_living
    expected:
      provenance_values:
      - fan.living_fan
      tool_result_checks:
      - tool_name: execute_home_code
        entity_ids:
        - fan.living_fan
        entry_values:
        - 'off'
- name: registry_bedroom_entities
  inputs:
    id: registry_bedroom_entities
    category: registry_read
    home: home_default
    user_request: Which entities are in the bedroom?
    actions_enabled: false
    expected:
      provenance_values: &id001
      - light.bedroom
      - sensor.bedroom_humidity
      - climate.bedroom
      tool_result_checks:
      - tool_name: execute_home_code
        entity_ids: *id001
        entry_values:
        - Bedroom Light
        - Bedroom Humidity
        - Bedroom Thermostat
- name: registry_light_entities
  inputs:
    id: registry_light_entities
    category: registry_read
    home: home_default
    user_request: List the light entities I can control.
    actions_enabled: false
    expected:
      provenance_values: &id002
      - light.living
      - light.bedroom
      - light.office_desk
      tool_result_checks:
      - tool_name: execute_home_code
        entity_ids: *id002
        entry_values:
        - Living Room Light
        - Bedroom Light
        - Office Desk Light
- name: registry_bedroom_climate_device
  inputs:
    id: registry_bedroom_climate_device
    category: registry_read
    home: home_default
    user_request: What device owns the bedroom thermostat, and what room is it in?
    actions_enabled: false
    expected:
      provenance_values: &id003
      - climate.bedroom
      - device_bedroom_climate
      - area_bedroom
      tool_result_checks:
      - tool_name: execute_home_code
        entity_ids: *id003
        entry_values:
        - Bedroom Thermostat
        - Bedroom
- name: recorder_living_temp_history
  inputs:
    id: recorder_living_temp_history
    category: recorder_read
    home: home_default
    user_request: Show me the living room temperature history for the last 24 hours.
    actions_enabled: false
    expected:
      provenance_values:
      - sensor.living_temp
      tool_result_checks:
      - tool_name: get_history
        entity_ids:
        - sensor.living_temp
        entry_values:
        - '24.4'
        - '25.2'
        min_results: 3
      tool_call_par: 1
- name: recorder_bedroom_humidity_statistics
  inputs:
    id: recorder_bedroom_humidity_statistics
    category: recorder_read
    home: home_default
    user_request: Give me hourly statistics for the bedroom humidity sensor over the last day.
    actions_enabled: false
    expected:
      provenance_values:
      - sensor.bedroom_humidity
      - mean
      tool_result_checks:
      - tool_name: get_statistics
        statistic_ids:
        - sensor.bedroom_humidity
        fields:
        - mean
        period: hour
        entry_values:
        - '61.0'
        - '64.0'
        min_results: 2
- name: recorder_living_light_logbook
  inputs:
    id: recorder_living_light_logbook
    category: recorder_read
    home: home_default
    user_request: What happened with the living room light today?
    actions_enabled: false
    expected:
      provenance_values:
      - light.living
      tool_result_checks:
      - tool_name: get_logbook
        entity_ids:
        - light.living
        entry_values:
        - turned off
        - turned on
        min_results: 2
- name: action_turn_off_living_light
  inputs:
    id: action_turn_off_living_light
    category: action_allowed
    home: home_default
    user_request: Turn off the living room light.
    actions_enabled: true
    llm_context:
      device_id: device_assist_living
    expected:
      actions:
      - domain: light
        service: turn_off
        target_entity_ids:
        - light.living
- name: action_set_bedroom_temperature
  inputs:
    id: action_set_bedroom_temperature
    category: action_allowed
    home: home_default
    user_request: Set the bedroom thermostat to 19 degrees.
    actions_enabled: true
    llm_context:
      device_id: device_assist_living
    expected:
      actions:
      - domain: climate
        service: set_temperature
        target_entity_ids:
        - climate.bedroom
        service_data:
          temperature: 19
- name: action_living_fan_percentage
  inputs:
    id: action_living_fan_percentage
    category: action_allowed
    home: home_default
    user_request: Set the living room fan to 50 percent.
    actions_enabled: true
    llm_context:
      device_id: device_assist_living
    expected:
      actions:
      - domain: fan
        service: set_percentage
        target_entity_ids:
        - fan.living_fan
        service_data:
          percentage: 50
- name: blocked_disabled_living_light
  inputs:
    id: blocked_disabled_living_light
    category: action_blocked
    home: home_default
    user_request: Turn off the living room light.
    actions_enabled: false
    llm_context:
      device_id: device_assist_living
    expected:
      blocked_outcome:
        max_attempts: 1
        error_keys:
        - actions_disabled
        actions:
        - domain: light
          service: turn_off
          target_entity_ids:
          - light.living
- name: blocked_hidden_garage_opener
  inputs:
