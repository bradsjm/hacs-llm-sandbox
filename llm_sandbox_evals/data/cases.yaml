# yaml-language-server: $schema=cases_schema.json
name: llm_sandbox_action_cases
cases:
  - name: direct_turn_on_utility_room_ceiling
    inputs:
      id: direct_turn_on_utility_room_ceiling
      home: home_full
      category: direct
      tags: []
      oracle: effect
      requests:
        - id: canonical
          text: Turn on the Utility Room ceiling light.
        - id: conversational
          text: Can you switch on the Utility Room ceiling light?
      required_actions:
        - domain: light
          service: turn_on
          target_entity_ids: [light.utility_room_ceiling]
      desired_entities:
        - entity_id: light.utility_room_ceiling
          state: "on"
  - name: direct_turn_off_utility_room_accent
    inputs:
      id: direct_turn_off_utility_room_accent
      home: home_full
      category: direct
      tags: []
      oracle: effect
      requests:
        - id: canonical
          text: Turn off the Utility Room accent light.
      required_actions:
        - domain: light
          service: turn_off
          target_entity_ids: [light.utility_room_accent]
      desired_entities:
        - entity_id: light.utility_room_accent
          state: "off"
  - name: direct_toggle_utility_room_outlet
    inputs:
      id: direct_toggle_utility_room_outlet
      home: home_full
      category: direct
      tags: []
      oracle: effect
      requests:
        - id: canonical
          text: Toggle the Utility Room outlet.
      required_actions:
        - domain: switch
          service: toggle
          target_entity_ids: [switch.utility_room_outlet]
      desired_entities:
        - entity_id: switch.utility_room_outlet
          state: "on"
  - name: discover_utility_room_lights
    inputs:
      id: discover_utility_room_lights
      home: home_full
      category: discovery
      tags: []
      oracle: effect
      judge_code: true
      requests:
        - id: canonical
          text: Turn on all the lights in the Utility Room.
      required_actions:
        - domain: light
          service: turn_on
          target_entity_ids: [light.utility_room_accent, light.utility_room_ceiling]
  - name: discover_basement_ceiling_lights
    inputs:
      id: discover_basement_ceiling_lights
      home: home_full
      category: discovery
      tags: []
      oracle: effect
      judge_code: true
      requests:
        - id: canonical
          text: Turn on every ceiling light in the Basement.
      required_actions:
        - domain: light
          service: turn_on
          target_entity_ids:
            - light.utility_room_ceiling
            - light.storage_room_ceiling
            - light.workshop_ceiling
            - light.wine_cellar_ceiling
            - light.home_gym_ceiling
            - light.media_room_ceiling
            - light.laundry_room_ceiling
            - light.basement_bathroom_ceiling
            - light.playroom_ceiling
            - light.wine_tasting_room_ceiling
            - light.basement_hallway_ceiling
            - light.server_room_ceiling
      desired_entities:
        - entity_id: light.utility_room_ceiling
          state: "on"
        - entity_id: light.storage_room_ceiling
          state: "on"
        - entity_id: light.workshop_ceiling
          state: "on"
        - entity_id: light.wine_cellar_ceiling
          state: "on"
        - entity_id: light.home_gym_ceiling
          state: "on"
        - entity_id: light.media_room_ceiling
          state: "on"
        - entity_id: light.laundry_room_ceiling
          state: "on"
        - entity_id: light.basement_bathroom_ceiling
          state: "on"
        - entity_id: light.playroom_ceiling
          state: "on"
        - entity_id: light.wine_tasting_room_ceiling
          state: "on"
        - entity_id: light.basement_hallway_ceiling
          state: "on"
        - entity_id: light.server_room_ceiling
          state: "on"
  - name: brightness_utility_room_ceiling
    inputs:
      id: brightness_utility_room_ceiling
      home: home_full
      category: service_data
      tags: []
      oracle: effect
      requests:
        - id: canonical
          text: Set the Utility Room ceiling light to 50% brightness.
        - id: paraphrase_half
          text: Make the Utility Room ceiling light half as bright.
      required_actions:
        - domain: light
          service: turn_on
          target_entity_ids: [light.utility_room_ceiling]
          service_data:
            brightness_pct: 50
      desired_entities:
        - entity_id: light.utility_room_ceiling
          attributes:
            brightness: 128
  - name: color_utility_room_accent
    inputs:
      id: color_utility_room_accent
      home: home_full
      category: service_data
      tags: []
      oracle: effect
      requests:
        - id: canonical
          text: Set the Utility Room accent light to 2700 K warm white.
      required_actions:
        - domain: light
          service: turn_on
          target_entity_ids: [light.utility_room_accent]
          service_data:
            color_temp_kelvin: 2700
      desired_entities:
        - entity_id: light.utility_room_accent
          attributes:
            color_temp_kelvin: 2700
  - name: no_action_light_already_on
    inputs:
      id: no_action_light_already_on
      home: home_full
      category: conditional
      tags: []
      oracle: effect
      requests:
        - id: canonical
          text: Turn on the Living Room ceiling light if it is off.
      required_actions: []
      desired_entities:
        - entity_id: light.living_room_ceiling
          state: "on"
  - name: condition_turn_off_living_room_ceiling
    inputs:
      id: condition_turn_off_living_room_ceiling
      home: home_full
      category: conditional
      tags: []
      oracle: effect
      requests:
        - id: canonical
          text: The Living Room ceiling light is currently on. Turn it off.
      required_actions:
        - domain: light
          service: turn_off
          target_entity_ids: [light.living_room_ceiling]
      desired_entities:
        - entity_id: light.living_room_ceiling
          state: "off"
  - name: condition_history_change_turn_off
    inputs:
      id: condition_history_change_turn_off
      home: home_full
      category: conditional
      tags: []
      oracle: effect
      judge_code: true
      requests:
        - id: canonical
          text: If the Living Room ceiling light changed state in the last two hours, turn it off.
      required_actions:
        - domain: light
          service: turn_off
          target_entity_ids: [light.living_room_ceiling]
      desired_entities:
        - entity_id: light.living_room_ceiling
          state: "off"
  - name: no_action_history_no_recent_change
    inputs:
      id: no_action_history_no_recent_change
      home: home_full
      category: conditional
      tags: []
      oracle: effect
      judge_code: true
      requests:
        - id: canonical
          text: If the Hallway outlet changed state in the last hour, toggle it; otherwise do nothing.
      required_actions: []
      desired_entities:
        - entity_id: switch.hallway_outlet
          state: "off"
  - name: ambiguous_bare_light
    inputs:
      id: ambiguous_bare_light
      home: home_full
      category: ambiguity
      tags: []
      oracle: effect
      requests:
        - id: canonical
          text: Turn on the light.
        - id: paraphrase_switch
          text: Switch on a light.
      required_actions: []
  - name: ambiguous_ceiling_no_area
    inputs:
      id: ambiguous_ceiling_no_area
      home: home_full
      category: ambiguity
      tags: []
      oracle: effect
      requests:
        - id: canonical
          text: Turn on the ceiling light.
      required_actions: []
  - name: ambiguous_logic_living_room_recent
    inputs:
      id: ambiguous_logic_living_room_recent
      home: home_full
      category: ambiguity
      tags: []
      oracle: effect
      judge_code: true
      requests:
        - id: canonical
          text: Turn off the Living Room light that was switched on most recently.
      required_actions:
        - domain: light
          service: turn_off
          target_entity_ids: [light.living_room_accent]
      desired_entities:
        - entity_id: light.living_room_accent
          state: "off"
  - name: tool_call_get_history_utility_room
    inputs:
      id: tool_call_get_history_utility_room
      home: home_full
      category: tool_contract
      oracle: tool_calls
      requests:
        - id: canonical
          text: Has the Utility Room ceiling light changed state recently?
      expected_tool_calls:
        - tool_name: get_history
          args:
            entity_ids: [light.utility_room_ceiling]
      required_actions: []
  - name: answer_count_lights_on_utility_room
    inputs:
      id: answer_count_lights_on_utility_room
      home: home_full
      category: read_answer
      oracle: answer
      requests:
        - id: canonical
          text: How many lights are on in the Utility Room?
        - id: paraphrase_currently
          text: How many Utility Room lights are currently on?
      expected_answer:
        kind: count
        count: 1
      required_actions: []
  - name: answer_state_utility_room_accent
    inputs:
      id: answer_state_utility_room_accent
      home: home_full
      category: read_answer
      oracle: answer
      requests:
        - id: canonical
          text: Is the Utility Room accent light on or off?
      expected_answer:
        kind: state
        entity_id: light.utility_room_accent
        state: "on"
      required_actions: []
  - name: tool_call_get_statistics_balcony_power
    inputs:
      id: tool_call_get_statistics_balcony_power
      home: home_full
      category: tool_contract
      oracle: tool_calls
      requests:
        - id: canonical
          text: Get the recorded statistics for Balcony power.
      expected_tool_calls:
        - tool_name: get_statistics
          args:
            statistic_ids: [sensor.balcony_power]
      required_actions: []
  - name: tool_call_get_logbook_living_room_accent
    inputs:
      id: tool_call_get_logbook_living_room_accent
      home: home_full
      category: tool_contract
      oracle: tool_calls
      requests:
        - id: canonical
          text: What logbook activity is available for the Living Room accent light?
      expected_tool_calls:
        - tool_name: get_logbook
          args:
            entity_ids: [light.living_room_accent]
      required_actions: []
  - name: answer_mean_balcony_power
    inputs:
      id: answer_mean_balcony_power
      home: home_full
      category: read_answer
      oracle: answer
      requests:
        - id: canonical
          text: >-
            The Balcony power sensor has two hourly statistics recorded between
            10:00 and 12:00 UTC. What is the arithmetic mean of their mean
            values? Return only the number.
      expected_answer:
        kind: scalar
        scalar_value: 40
        tolerance: 0
      required_actions: []
  - name: answer_both_living_room_lights_turned_on
    inputs:
      id: answer_both_living_room_lights_turned_on
      home: home_full
      category: read_answer
      oracle: answer
      requests:
        - id: canonical
          text: >-
            Did both Living Room lights turn on between 11:00 and 12:00 UTC?
            Answer exactly Yes or No.
      expected_answer:
        kind: boolean
        value: true
      required_actions: []
  - name: answer_living_room_lights_turned_on_set
    inputs:
      id: answer_living_room_lights_turned_on_set
      home: home_full
      category: read_answer
      oracle: answer
      requests:
        - id: canonical
          text: >-
            Which Living Room lights turned on between 11:00 and 12:00 UTC?
            Return only their entity IDs.
      expected_answer:
        kind: entity_set
        entity_ids:
          - light.living_room_ceiling
          - light.living_room_accent
      required_actions: []
  - name: answer_living_room_accent_turn_on_time
    inputs:
      id: answer_living_room_accent_turn_on_time
      home: home_full
      category: read_answer
      oracle: answer
      requests:
        - id: canonical
          text: >-
            When did the Living Room accent light turn on? Return exactly one
            RFC3339 timestamp.
      expected_answer:
        kind: time_range
        start: "2026-06-29T11:50:00+00:00"
        end: "2026-06-29T11:50:00+00:00"
      required_actions: []
  - name: selector_evening_lights_living_room_off
    inputs:
      id: selector_evening_lights_living_room_off
      home: home_full
      category: discovery
      tags: []
      oracle: effect
      requests:
        - id: canonical
          text: Turn off every light in the Living Room tagged Evening.
      required_actions:
        - domain: light
          service: turn_off
          target_entity_ids: [light.living_room_ceiling, light.living_room_accent]
      desired_entities:
        - entity_id: light.living_room_ceiling
          state: "off"
        - entity_id: light.living_room_accent
          state: "off"
  - name: answer_count_climate_label_second_floor
    inputs:
      id: answer_count_climate_label_second_floor
      home: home_full
      category: read_answer
      oracle: answer
      requests:
        - id: canonical
          text: >-
            How many climate entities on the Second Floor have the Climate
            label? Return only the integer.
      expected_answer:
        kind: count
        count: 9
      required_actions: []
  - name: multi_action_swap_utility_room_lights
    inputs:
      id: multi_action_swap_utility_room_lights
      home: home_full
      category: composition
      tags: []
      oracle: effect
      requests:
        - id: canonical
          text: Turn off the Utility Room accent light and turn on the Utility Room ceiling light.
      required_actions:
        - domain: light
          service: turn_off
          target_entity_ids: [light.utility_room_accent]
        - domain: light
          service: turn_on
          target_entity_ids: [light.utility_room_ceiling]
      desired_entities:
        - entity_id: light.utility_room_accent
          state: "off"
        - entity_id: light.utility_room_ceiling
          state: "on"
  - name: condition_climate_below_threshold_set_temperature
    inputs:
      id: condition_climate_below_threshold_set_temperature
      home: home_full
      category: conditional
      tags: []
      oracle: effect
      requests:
        - id: canonical
          text: If the Workshop temperature is below 22 °C, set the Workshop thermostat target temperature to 22 °C.
      required_actions:
        - domain: climate
          service: set_temperature
          target_entity_ids: [climate.workshop]
          service_data:
            temperature: 22
      desired_entities:
        - entity_id: climate.workshop
          attributes:
            temperature: 22
  - name: no_action_climate_not_below_threshold
    inputs:
      id: no_action_climate_not_below_threshold
      home: home_full
      category: conditional
      tags: []
      oracle: effect
      requests:
        - id: canonical
          text: If the Storage Room temperature is below 20 °C, set its thermostat target temperature to 22 °C; otherwise do nothing.
      required_actions: []
      desired_entities:
        - entity_id: climate.storage_room
          attributes:
            temperature: 20.0
  - name: cover_open_office_blinds
    inputs:
      id: cover_open_office_blinds
      home: home_cover
      category: direct
      tags: []
      oracle: effect
      requests:
        - id: canonical
          text: Open the Office blinds.
      required_actions:
        - domain: cover
          service: open_cover
          target_entity_ids: [cover.office_blinds]
      desired_entities:
        - entity_id: cover.office_blinds
          state: open
          attributes:
            current_position: 100
  - name: cover_close_bedroom_shade
    inputs:
      id: cover_close_bedroom_shade
      home: home_cover
      category: direct
      tags: []
      oracle: effect
      requests:
        - id: canonical
          text: Close the Bedroom shade.
      required_actions:
        - domain: cover
          service: close_cover
          target_entity_ids: [cover.bedroom_shade]
      desired_entities:
        - entity_id: cover.bedroom_shade
          state: closed
          attributes:
            current_position: 0
  - name: cover_position_office_blinds_half
    inputs:
      id: cover_position_office_blinds_half
      home: home_cover
      category: service_data
      tags: []
      oracle: effect
      requests:
        - id: canonical
          text: Set the Office blinds to 50%.
      required_actions:
        - domain: cover
          service: set_cover_position
          target_entity_ids: [cover.office_blinds]
          service_data:
            position: 50
      desired_entities:
        - entity_id: cover.office_blinds
          state: open
          attributes:
            current_position: 50
  - name: cover_no_action_bedroom_shade_not_closed
    inputs:
      id: cover_no_action_bedroom_shade_not_closed
      home: home_cover
      category: conditional
      tags: []
      oracle: effect
      requests:
        - id: canonical
          text: If the Bedroom shade is closed, set it to 50%; otherwise do nothing.
      required_actions: []
      desired_entities:
        - entity_id: cover.bedroom_shade
          state: open
          attributes:
            current_position: 100
  - name: tool_call_get_automation_motion_lights
    inputs:
      id: tool_call_get_automation_motion_lights
      home: home_full
      category: tool_contract
      oracle: tool_calls
      requests:
        - id: canonical
          text: Search automations for "motion lights".
      expected_tool_calls:
        - tool_name: get_automation
          args:
            query: motion lights
      required_actions: []
  - name: tool_call_get_automation_motion_lights_content
    inputs:
      id: tool_call_get_automation_motion_lights_content
      home: home_full
      category: tool_contract
      oracle: tool_calls
      requests:
        - id: canonical
          text: Retrieve the complete content for automation.living_room_motion_lights.
      expected_tool_calls:
        - tool_name: get_automation
          args:
            entity_ids: [automation.living_room_motion_lights]
            include: [content]
      required_actions: []
  - name: tool_call_get_automation_motion_lights_runs
    inputs:
      id: tool_call_get_automation_motion_lights_runs
      home: home_full
      category: tool_contract
      oracle: tool_calls
      requests:
        - id: canonical
          text: Retrieve runs from the last hour for automation.living_room_motion_lights.
      expected_tool_calls:
        - tool_name: get_automation
          args:
            entity_ids: [automation.living_room_motion_lights]
            include: [runs]
            hours: 1
      required_actions: []
  - name: tool_call_get_energy_workshop_circuit_daily_trend
    inputs:
      id: tool_call_get_energy_workshop_circuit_daily_trend
      home: home_full
      category: tool_contract
      tags: [energy]
      oracle: tool_calls
      requests:
        - id: canonical
          text: Show the tracked-device daily Energy trend from June 22 through June 28, 2026.
      expected_tool_calls:
        - tool_name: get_energy
          args:
            start: "2026-06-22T00:00:00Z"
            end: "2026-06-29T00:00:00Z"
            period: day
            source_types: [device]
            include: [summary, series]
      required_actions: []
  - name: tool_call_execute_home_code_energy_and_balcony_power
    inputs:
      id: tool_call_execute_home_code_energy_and_balcony_power
      home: home_full
      category: tool_contract
      tags: [energy]
      oracle: tool_calls
      requests:
        - id: canonical
          text: What was the home's electricity consumption from June 22 through June 28, 2026, together with the current sensor.balcony_power state?
      expected_tool_calls:
        - tool_name: execute_home_code
          args: {}
          arg_contains:
            code: [hass.energy, sensor.balcony_power]
      required_actions: []
  - name: answer_living_room_motion_automation_ran_last_hour
    inputs:
      id: answer_living_room_motion_automation_ran_last_hour
      home: home_full
      category: read_answer
      oracle: answer
      requests:
        - id: canonical
          text: Did automation.living_room_motion_lights run in the last hour? Answer exactly Yes or No.
      expected_answer:
        kind: boolean
        value: true
      required_actions: []
  - name: answer_energy_home_consumption_week
    inputs:
      id: answer_energy_home_consumption_week
      home: home_full
      category: read_answer
      tags: [energy]
      oracle: answer
      requests:
        - id: canonical
          text: How much electricity did the home consume from June 22 through June 28, 2026? Answer with one number and unit.
      expected_answer:
        kind: scalar
        scalar_value: 117
        unit: kWh
        tolerance: 0
      required_actions: []
  - name: answer_energy_workshop_circuit_exclusive_week
    inputs:
      id: answer_energy_workshop_circuit_exclusive_week
      home: home_full
      category: read_answer
      tags: [energy]
      oracle: answer
      requests:
        - id: canonical
          text: Excluding its tracked child, how much energy did the Workshop circuit consume from June 22 through June 28, 2026? Answer with one number and unit.
      expected_answer:
        kind: scalar
        scalar_value: 22
        unit: kWh
        tolerance: 0
      required_actions: []
  - name: answer_energy_solar_generation_week
    inputs:
      id: answer_energy_solar_generation_week
      home: home_full
      category: read_answer
      tags: [energy]
      oracle: answer
      requests:
        - id: canonical
          text: How much solar energy was generated from June 22 through June 28, 2026? Answer with one number and unit.
      expected_answer:
        kind: scalar
        scalar_value: 47
        unit: kWh
        tolerance: 0
      required_actions: []
